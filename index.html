      const saveBet = () => { if (!betForm.market || !betForm.contracts || !betForm.avgPrice) return; const priceAsDecimal = parseFloat(betForm.avgPrice) / 100; const bet = { ...betForm, contracts: parseInt(betForm.contracts) || 0, avgPrice: priceAsDecimal, id: editingBet || `pos_${Date.now()}` }; if (editingBet) { const oldBet = bets.find(b => b.id === editingBet); if (oldBet && oldBet.status !== bet.status) { let adj = 0; if (oldBet.status === "won") adj -= calcProfit(oldBet.contracts, oldBet.avgPrice); if (oldBet.status === "lost") adj += calcCost(oldBet.contracts, oldBet.avgPrice); if (bet.status === "won") adj += calcProfit(bet.contracts, bet.avgPrice); if (bet.status === "lost") adj -= calcCost(bet.contracts, bet.avgPrice); saveBankroll({ current: bankroll.current + adj }); } } saveBetToDB(bet); setShowAddBet(false); };
      const deleteBet = (id) => { const bet = bets.find(b => b.id === id); if (bet) { let adj = 0; if (bet.status === "won") adj = -calcProfit(bet.contracts, bet.avgPrice); if (bet.status === "lost") adj = calcCost(bet.contracts, bet.avgPrice); saveBankroll({ current: bankroll.current + adj }); } deleteBetFromDB(id); };
      const resolveBet = (id, status) => { const bet = bets.find(b => b.id === id); if (!bet) return; let adj = 0; if (status === "won") adj = calcProfit(bet.contracts, bet.avgPrice); if (status === "lost") adj = -calcCost(bet.contracts, bet.avgPrice); saveBankroll({ current: bankroll.current + adj }); saveBetToDB({ ...bet, status }); };
      const formContracts = parseInt(betForm.contracts) || 0; const formPrice = (parseFloat(betForm.avgPrice) || 0) / 100; const formCost = calcCost(formContracts, formPrice); const formProfit = calcProfit(formContracts, formPrice);
      const kellyProbVal = (parseFloat(kellyProb) || 0) / 100; const kellyPriceVal = (parseFloat(kellyPrice) || 0) / 100; const kellyFraction = calcKelly(kellyProbVal, kellyPriceVal); const kellyDollars = kellyFraction * bankroll.current; const kellyContracts = kellyPriceVal > 0 ? Math.floor(kellyDollars / kellyPriceVal) : 0;
      if (!loaded) return (<div style={{ fontFamily: T.sans, background: T.bg, color: T.textMuted, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>Loading your data...</div>);

        <div style={{ fontFamily: T.sans, background: T.bg, color: T.text, minHeight: "100vh", padding: "16px 20px", maxWidth: 1200, margin: "0 auto" }}>

              <TabBtn active={tab === "positions"} onClick={() => setTab("positions")}>Positions</TabBtn>
              <TabBtn active={tab === "signals"} onClick={() => setTab("signals")}>Signals</TabBtn>
              <TabBtn active={tab === "settings"} onClick={() => setTab("settings")}>Settings</TabBtn>
            </div>
          </div>
          {syncMsg && (<div style={{ padding: "8px 12px", marginBottom: 12, borderRadius: 6, fontSize: 12, fontFamily: T.mono, background: syncMsg.includes("failed") ? `${T.red}15` : `${T.green}15`, color: syncMsg.includes("failed") ? T.red : T.green, border: `1px solid ${syncMsg.includes("failed") ? T.red : T.green}33` }}>{syncMsg}</div>)}
          {lastSync && !syncMsg && (<div style={{ fontSize: 11, color: T.textDim, fontFamily: T.mono, marginBottom: 12 }}>Last synced: {new Date(lastSync).toLocaleString()} · auto-syncs every 5 min</div>)}

            <div className="stat-row" style={{ display: "flex", gap: 10, flexWrap: "wrap" }}><StatBlock label="Bankroll" value={formatMoney(bankroll.current)} sub={`Started: ${formatMoney(bankroll.initial)}`} /><StatBlock label="Net P&L" value={formatMoney(stats.netPnL)} color={stats.netPnL >= 0 ? T.green : T.red} sub={`ROI: ${formatPct(stats.roi)}`} /><StatBlock label="Win Rate" value={stats.completed.length > 0 ? formatPct(stats.winRate) : "—"} sub={`${stats.wins.length}W / ${stats.losses.length}L`} color={stats.winRate >= 50 ? T.green : stats.winRate > 0 ? T.red : T.textMuted} /><StatBlock label="Position Size" value={formatMoney(stats.unitSize)} sub={`${bankroll.unitPercent}% of bankroll`} /></div>
            <div className="stat-row" style={{ display: "flex", gap: 10, flexWrap: "wrap" }}><StatBlock label="Avg Win" value={formatMoney(stats.avgWin)} color={T.green} /><StatBlock label="Avg Loss" value={formatMoney(stats.avgLoss)} color={T.red} /><StatBlock label="Open Positions" value={stats.pending.length} sub={`${stats.pendingContracts} contracts · ${formatMoney(stats.pendingCost)} at risk`} color={T.yellow} mono={false} /><StatBlock label="Avg Entry" value={stats.weightedAvgPrice > 0 ? formatCents(stats.weightedAvgPrice) : "—"} sub={`${stats.totalContracts} total contracts`} /></div>
            {signals.filter(s => s.severity !== "info").length > 0 && (<div style={{ background: T.surface, borderRadius: 8, border: `1px solid ${T.border}`, padding: 14 }}><div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10, fontWeight: 500 }}>Active Signals</div>{signals.filter(s => s.severity !== "info").slice(0, 3).map((sig, i) => (<div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: `${SEVERITY_COLORS[sig.severity]}08`, borderRadius: 6, borderLeft: `3px solid ${SEVERITY_COLORS[sig.severity]}`, marginBottom: 6, flexWrap: "wrap" }}><Pill color={SEVERITY_COLORS[sig.severity]}>{sig.severity}</Pill><span style={{ fontSize: 13, fontWeight: 500 }}>{sig.title}</span><span style={{ fontSize: 12, color: T.textMuted, flex: 1, minWidth: 100 }}>{sig.message.length > 80 ? sig.message.substring(0, 80) + "…" : sig.message}</span><span style={{ cursor: "pointer", fontSize: 12, color: T.accent }} onClick={() => setTab("signals")}>View →</span></div>))}</div>)}

            <Btn variant="primary" onClick={openAddBet} style={{ alignSelf: "flex-start" }}>+ New Position</Btn>
          </div>)}
          {tab === "positions" && (<div>
            <div className="filter-row" style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "center", flexWrap: "wrap" }}><Btn variant="primary" onClick={openAddBet}>+ New Position</Btn><div style={{ flex: 1 }} /><select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ ...inputStyle, width: 120 }}><option value="all">All</option><option value="pending">Open</option><option value="won">Won</option><option value="lost">Lost</option><option value="void">Void</option></select><select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} style={{ ...inputStyle, width: 130 }}><option value="all">All Categories</option>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select><select value={`${sortBy}_${sortDir}`} onChange={e => { const [by, dir] = e.target.value.split("_"); setSortBy(by); setSortDir(dir); }} style={{ ...inputStyle, width: 140 }}><option value="date_desc">Newest</option><option value="date_asc">Oldest</option><option value="cost_desc">Highest Cost</option><option value="cost_asc">Lowest Cost</option><option value="market_asc">A-Z</option></select></div>
            {filteredBets.length === 0 ? (<div style={{ textAlign: "center", color: T.textMuted, padding: 50, fontSize: 14 }}>{bets.length === 0 ? "No positions. Syncing from Kalshi..." : "No matches."}</div>) : (<div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <div className="bet-header" style={{ display: "grid", gridTemplateColumns: "90px 1fr 80px 50px 70px 60px 70px 80px 40px", gap: 6, padding: "8px 10px", fontSize: 11, color: T.textDim, textTransform: "uppercase", letterSpacing: "0.06em", fontFamily: T.sans, fontWeight: 500, borderBottom: `1px solid ${T.border}` }}><span>Date</span><span>Market</span><span>Cat</span><span>Side</span><span>#</span><span>Price</span><span>Cost</span><span>Status</span><span></span></div>
              {filteredBets.map(bet => { const cost = calcCost(bet.contracts, bet.avgPrice); const profit = calcProfit(bet.contracts, bet.avgPrice); return (<div key={bet.id}>
                <div className="bet-grid" onClick={() => setExpandedBet(expandedBet === bet.id ? null : bet.id)} style={{ display: "grid", gridTemplateColumns: "90px 1fr 80px 50px 70px 60px 70px 80px 40px", gap: 6, padding: "10px 10px", fontSize: 13, fontFamily: T.mono, background: expandedBet === bet.id ? T.surfaceHover : T.surface, borderRadius: 4, cursor: "pointer", alignItems: "center", borderBottom: `1px solid ${T.border}` }}><span style={{ color: T.textMuted, fontSize: 12 }}>{bet.date}</span><span style={{ fontFamily: T.sans, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{bet.market}</span><Pill>{bet.category}</Pill><span style={{ color: bet.position === "Yes" ? T.green : T.red, fontSize: 12 }}>{bet.position}</span><span>{bet.contracts}</span><span>{formatCents(bet.avgPrice)}</span><span>{formatMoney(cost)}</span><Pill color={STATUS_COLORS[bet.status]}>{bet.status === "pending" ? "open" : bet.status}</Pill><span style={{ fontSize: 12, color: T.textDim }}>▾</span></div>
                {expandedBet === bet.id && (<div style={{ padding: "12px 14px", background: T.bg, borderRadius: "0 0 6px 6px", borderLeft: `2px solid ${STATUS_COLORS[bet.status]}`, marginBottom: 4 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, fontSize: 12, marginBottom: 10 }}><div><span style={{ color: T.textDim }}>Contracts: </span><span style={{ fontFamily: T.mono }}>{bet.contracts}</span></div><div><span style={{ color: T.textDim }}>Price: </span><span style={{ fontFamily: T.mono }}>{formatCents(bet.avgPrice)}</span></div><div><span style={{ color: T.textDim }}>Cost: </span><span style={{ fontFamily: T.mono }}>{formatMoney(cost)}</span></div><div><span style={{ color: T.textDim }}>If Win: </span><span style={{ fontFamily: T.mono, color: T.green }}>+{formatMoney(profit)}</span></div><div><span style={{ color: T.textDim }}>If Lose: </span><span style={{ fontFamily: T.mono, color: T.red }}>-{formatMoney(cost)}</span></div><div><span style={{ color: T.textDim }}>P&L: </span><span style={{ fontFamily: T.mono, color: bet.status === "won" ? T.green : bet.status === "lost" ? T.red : T.textMuted }}>{bet.status === "won" ? `+${formatMoney(profit)}` : bet.status === "lost" ? `-${formatMoney(cost)}` : "open"}</span></div></div>
                  {bet.ticker && <div style={{ fontSize: 11, color: T.textDim, fontFamily: T.mono, marginBottom: 6 }}>Ticker: {bet.ticker}</div>}
                  {bet.notes && <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 10, padding: "6px 10px", background: T.surface, borderRadius: 4, fontStyle: "italic" }}>{bet.notes}</div>}
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>{bet.status === "pending" && (<><Btn variant="success" onClick={() => resolveBet(bet.id, "won")} style={{ fontSize: 12, padding: "4px 10px" }}>Won</Btn><Btn variant="danger" onClick={() => resolveBet(bet.id, "lost")} style={{ fontSize: 12, padding: "4px 10px" }}>Lost</Btn><Btn onClick={() => resolveBet(bet.id, "void")} style={{ fontSize: 12, padding: "4px 10px" }}>Void</Btn></>)}<Btn onClick={() => openEditBet(bet)} style={{ fontSize: 12, padding: "4px 10px" }}>Edit</Btn><Btn variant="danger" onClick={() => { if (confirm("Delete?")) deleteBet(bet.id); }} style={{ fontSize: 12, padding: "4px 10px" }}>Delete</Btn></div>
                </div>)}
              </div>); })}
            </div>)}
          </div>)}
          {tab === "signals" && (<div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500, marginBottom: 4 }}>Signals & Recommendations</div>
            {signals.map((sig, i) => (<div key={i} style={{ padding: 14, background: T.surface, borderRadius: 8, border: `1px solid ${T.border}`, borderLeft: `4px solid ${SEVERITY_COLORS[sig.severity]}` }}><div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, flexWrap: "wrap" }}><Pill color={SEVERITY_COLORS[sig.severity]}>{sig.severity}</Pill><span style={{ fontSize: 14, fontWeight: 600 }}>{sig.title}</span>{sig.action && <Pill color={T.accent}>{sig.action}</Pill>}</div><div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6 }}>{sig.message}</div></div>))}
            <div style={{ marginTop: 16, padding: 14, background: T.surface, borderRadius: 8, border: `1px solid ${T.border}` }}><div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500, marginBottom: 10 }}>Kelly Criterion</div><div style={{ fontSize: 12, color: T.textDim, marginBottom: 10 }}>True probability vs contract price → optimal contracts.</div><div className="kelly-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}><Field label="True Prob (%)" hint="Your estimate"><input type="number" value={kellyProb} onChange={e => setKellyProb(e.target.value)} style={inputStyle} placeholder="65" /></Field><Field label="Contract Price (¢)" hint="Kalshi price"><input type="number" value={kellyPrice} onChange={e => setKellyPrice(e.target.value)} style={inputStyle} placeholder="55" /></Field><div style={{ display: "flex", flexDirection: "column", gap: 4 }}><label style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500 }}>Optimal</label><div style={{ fontSize: 18, fontFamily: T.mono, fontWeight: 700, color: kellyFraction > 0 ? T.green : T.textMuted, paddingTop: 4 }}>{kellyFraction > 0 ? (<>{kellyContracts} <span style={{ fontSize: 11, fontWeight: 400, color: T.textDim }}>full Kelly</span><div style={{ fontSize: 12, color: T.textMuted, fontWeight: 400, marginTop: 2 }}>{formatMoney(kellyDollars)} · ½K: {Math.floor(kellyContracts / 2)} · ¼K: {Math.floor(kellyContracts / 4)}</div></>) : "—"}</div></div></div></div>
          </div>)}
          {tab === "settings" && (<div style={{ maxWidth: 500 }}>
            <div style={{ fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500, marginBottom: 14 }}>Bankroll</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14, background: T.surface, padding: 18, borderRadius: 8, border: `1px solid ${T.border}` }}><Field label="Initial ($)"><input type="number" value={bankroll.initial} onChange={e => saveBankroll({ initial: parseFloat(e.target.value) || 0 })} style={inputStyle} /></Field><Field label="Current ($)"><input type="number" value={bankroll.current} onChange={e => saveBankroll({ current: parseFloat(e.target.value) || 0 })} style={inputStyle} /></Field><Field label={`Position Size — ${formatMoney((bankroll.current * bankroll.unitPercent) / 100)} max`}><input type="range" min="0.5" max="10" step="0.5" value={bankroll.unitPercent} onChange={e => saveBankroll({ unitPercent: parseFloat(e.target.value) })} style={{ width: "100%" }} /><div style={{ fontSize: 13, fontFamily: T.mono, color: T.text }}>{bankroll.unitPercent}%</div></Field><Field label="Profit Target (%)"><input type="number" value={bankroll.profitTarget} onChange={e => saveBankroll({ profitTarget: parseFloat(e.target.value) || 0 })} style={inputStyle} /></Field><Field label="Stop Loss (%)"><input type="number" value={bankroll.stopLoss} onChange={e => saveBankroll({ stopLoss: parseFloat(e.target.value) || 0 })} style={inputStyle} /></Field></div>
            <div style={{ marginTop: 20, fontSize: 11, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500, marginBottom: 10 }}>Data</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}><Btn onClick={() => { const data = JSON.stringify({ bankroll, bets }, null, 2); const blob = new Blob([data], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `kalshi_backup_${new Date().toISOString().split("T")[0]}.json`; a.click(); }}>Export</Btn><Btn onClick={() => { const input = document.createElement("input"); input.type = "file"; input.accept = ".json"; input.onchange = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const data = JSON.parse(ev.target.result); if (data.bankroll) saveBankroll(data.bankroll); if (data.bets && Array.isArray(data.bets)) data.bets.forEach(b => { if (b.id) saveBetToDB(b); }); } catch { alert("Invalid file"); } }; reader.readAsText(file); }; input.click(); }}>Import</Btn><Btn variant="danger" onClick={() => { if (confirm("Clear ALL data?")) { saveBankroll({ ...DEFAULT_BANKROLL }); if (userRef.current) userRef.current.child("bets").remove(); } }}>Reset</Btn></div>
            <div style={{ marginTop: 20, padding: 12, background: T.surface, borderRadius: 8, border: `1px solid ${T.border}`, fontSize: 12, color: T.textDim, lineHeight: 1.6 }}><strong style={{ color: T.text }}>{user.email}</strong> · Auto-syncs on load + every 5 min · Kalshi API connected{lastSync && <div style={{ marginTop: 4 }}>Last sync: {new Date(lastSync).toLocaleString()}</div>}</div>
          </div>)}
          {showAddBet && (<div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }} onClick={() => setShowAddBet(false)}>
            <div className="modal-inner" onClick={e => e.stopPropagation()} style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: 22, width: 520, maxHeight: "85vh", overflow: "auto" }}>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 14 }}>{editingBet ? "Edit Position" : "New Position"}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <Field label="Market"><input value={betForm.market} onChange={e => setBetForm(f => ({ ...f, market: e.target.value }))} style={inputStyle} placeholder="Will GDP exceed 3% in Q2?" /></Field>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}><Field label="Category"><select value={betForm.category} onChange={e => setBetForm(f => ({ ...f, category: e.target.value }))} style={inputStyle}>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select></Field><Field label="Position"><select value={betForm.position} onChange={e => setBetForm(f => ({ ...f, position: e.target.value }))} style={inputStyle}><option value="Yes">Yes</option><option value="No">No</option></select></Field></div>

                {formContracts > 0 && formPrice > 0 && (<div style={{ padding: 10, background: T.bg, borderRadius: 6, border: `1px solid ${T.border}`, fontFamily: T.mono, fontSize: 12 }}><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ color: T.textDim }}>Cost</span><span style={{ color: T.red }}>{formatMoney(formCost)}</span></div><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ color: T.textDim }}>Payout</span><span>{formatMoney(formContracts)}</span></div><div style={{ display: "flex", justifyContent: "space-between", borderTop: `1px solid ${T.border}`, paddingTop: 4 }}><span style={{ color: T.textDim }}>Profit</span><span style={{ color: T.green }}>+{formatMoney(formProfit)}</span></div><div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}><span style={{ color: T.textDim }}>Return</span><span style={{ color: T.green }}>{formCost > 0 ? formatPct((formProfit / formCost) * 100) : "—"}</span></div></div>)}

                <Field label="Notes"><textarea value={betForm.notes} onChange={e => setBetForm(f => ({ ...f, notes: e.target.value }))} style={{ ...inputStyle, minHeight: 50, resize: "vertical" }} placeholder="Gemini signal, reasoning..." /></Field>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 16, justifyContent: "flex-end" }}><Btn onClick={() => setShowAddBet(false)}>Cancel</Btn><Btn variant="primary" onClick={saveBet} disabled={!betForm.market || !betForm.contracts || !betForm.avgPrice}>Save</Btn></div>
            </div>
          </div>)}
        </div>
      );
    }
    function App() { const [user, setUser] = useState(null); const [loading, setLoading] = useState(true); useEffect(() => { const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); }); return unsub; }, []); const signIn = async () => { try { await auth.signInWithPopup(googleProvider); } catch (err) { if (err.code === "auth/popup-blocked" || err.code === "auth/popup-closed-by-user") { await auth.signInWithRedirect(googleProvider); } } }; if (loading || !user) return <LoginScreen onSignIn={signIn} loading={loading} />; return <Dashboard user={user} />; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
